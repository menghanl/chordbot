<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChordBot</title>
<meta name="description" content="Guitar fretboard practice tool — pick chord shapes, roll random note sequences with jianpu notation">
<meta name="theme-color" content="#4a6fff">
<meta property="og:title" content="ChordBot">
<meta property="og:description" content="Guitar fretboard practice tool — pick chord shapes, roll random note sequences">
<meta property="og:type" content="website">
<meta property="og:image" content="icons/icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root, [data-theme="light"] {
  --bg: #f5f5f0;
  --text: #333;
  --heading: #111;
  --btn-bg: #e8e8e0;
  --btn-border: #ccc;
  --btn-text: #444;
  --btn-hover: #ddd;
  --btn-active-bg: #c8c8f0;
  --btn-active-border: #6a6aee;
  --clear-border: #c88;
  --clear-text: #c44;
  --clear-hover: #f0dada;
  --fret-line: #aaa;
  --string-line: #999;
  --string-label: #888;
  --root-col-bg: rgba(100, 100, 255, 0.08);
  --root-col-border: #999;
  --dot-text: #777;
  --dot-hover: rgba(0, 0, 0, 0.06);
  --input-bg: #fff;
  --input-border: #ccc;
  --bar-bg: #e8e8e0;
  --bar-line: #aaa;
  --string-ind: #888;
  --muted: #999;
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --text: #e0e0e0;
  --heading: #fff;
  --btn-bg: #2a2a4a;
  --btn-border: #444;
  --btn-text: #ccc;
  --btn-hover: #3a3a6a;
  --btn-active-bg: #4a4a8a;
  --btn-active-border: #7a7aff;
  --clear-border: #633;
  --clear-text: #f88;
  --clear-hover: #4a2a2a;
  --fret-line: #555;
  --string-line: #666;
  --string-label: #666;
  --root-col-bg: rgba(100, 100, 255, 0.06);
  --root-col-border: #888;
  --dot-text: #888;
  --dot-hover: rgba(255, 255, 255, 0.08);
  --input-bg: #2a2a4a;
  --input-border: #444;
  --bar-bg: #22223a;
  --bar-line: #555;
  --string-ind: #888;
  --muted: #666;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
  transition: background 0.2s, color 0.2s;
}

h1 {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 16px;
  color: var(--heading);
}

.layout {
  display: flex;
  gap: 24px;
  min-height: calc(100vh - 32px);
}

.sidebar {
  flex-shrink: 0;
  width: 420px;
  padding: 12px;
  border-right: 1px solid var(--btn-border);
}

.sidebar.collapsed .sidebar-content { display: none; }
.sidebar.collapsed { width: auto; padding: 0; border: none; }

.sidebar-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  width: 32px;
  height: 32px;
  padding: 0;
  border: 1px solid var(--btn-border);
  border-radius: 6px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sidebar-toggle:hover { background: var(--btn-hover); }

.main {
  flex: 1;
  min-width: 0;
  padding: 12px;
}

.main-spacer {
  font-size: 1.4rem;
  margin-bottom: 16px;
  visibility: hidden;
}

.sidebar.collapsed + .main .main-spacer { display: none; }

.theme-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  padding: 6px 12px;
  border: 1px solid var(--btn-border);
  border-radius: 6px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-size: 0.85rem;
  cursor: pointer;
  z-index: 10;
}

.theme-toggle:hover { background: var(--btn-hover); }

/* --- Presets --- */
.presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.presets button {
  padding: 7px 4px;
  border: 1px solid var(--btn-border);
  border-radius: 6px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.15s;
}

.presets button:hover { background: var(--btn-hover); }
.presets button.active { background: var(--btn-active-bg); border-color: var(--btn-active-border); color: var(--heading); }
.presets button.clear { border-color: var(--clear-border); color: var(--clear-text); }
.presets button.clear:hover { background: var(--clear-hover); }

/* --- Root display & shape jumps --- */
.root-display {
  text-align: center;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.shape-jumps {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 8px;
}

.shape-jump {
  padding: 4px 12px;
  border: 2px solid var(--root-col-border);
  border-radius: 4px;
  background: transparent;
  color: var(--text);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.shape-jump:hover { background: var(--btn-hover); }
.shape-jump#jumpE { border-color: rgba(100, 100, 255, 0.5); }
.shape-jump#jumpA { border-color: rgba(255, 160, 60, 0.5); }

/* --- Fretboard --- */
.fretboard-container {
  overflow-x: auto;
  margin-bottom: 20px;
  padding-bottom: 4px;
}

.fretboard {
  display: grid;
  grid-template-columns: 24px repeat(16, 48px);
  grid-template-rows: repeat(6, 42px);
}

.fretboard .string-label {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: var(--string-label);
}

.fretboard .cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-right: 2px solid var(--fret-line);
  user-select: none;
}

.fret-headers {
  display: grid;
  grid-template-columns: 24px repeat(16, 48px);
  margin-bottom: 2px;
}

.fret-headers span {
  text-align: center;
  font-size: 0.65rem;
  color: var(--muted);
}

.cell::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: var(--string-line);
  z-index: 0;
}

.fretboard .row-0 .cell::before { height: 3px; margin-top: -1px; }
.fretboard .row-1 .cell::before { height: 2.5px; margin-top: -0.75px; }
.fretboard .row-2 .cell::before { height: 2px; margin-top: -0.5px; }

.cell.e-zone { background: rgba(100, 100, 255, 0.10); }
.cell.e-zone-root { background: rgba(100, 100, 255, 0.18); }
.cell.e-zone-left { background: rgba(100, 100, 255, 0.10); border-left: 3px solid rgba(100, 100, 255, 0.6); }
.cell.e-zone-right { border-right: 3px solid rgba(100, 100, 255, 0.6); }
.row-5 .cell.e-zone, .row-5 .cell.e-zone-root, .row-5 .cell.e-zone-left { border-top: 3px solid rgba(100, 100, 255, 0.6); }
.row-0 .cell.e-zone, .row-0 .cell.e-zone-root, .row-0 .cell.e-zone-left { border-bottom: 3px solid rgba(100, 100, 255, 0.6); }

.cell.a-zone { background: rgba(255, 160, 60, 0.10); }
.cell.a-zone-root { background: rgba(255, 160, 60, 0.18); }
.cell.a-zone-left { background: rgba(255, 160, 60, 0.10); border-left: 3px solid rgba(255, 160, 60, 0.6); }
.cell.a-zone-right { border-right: 3px solid rgba(255, 160, 60, 0.6); }
.row-5 .cell.a-zone, .row-5 .cell.a-zone-root, .row-5 .cell.a-zone-left { border-top: 3px solid rgba(255, 160, 60, 0.6); }
.row-0 .cell.a-zone, .row-0 .cell.a-zone-root, .row-0 .cell.a-zone-left { border-bottom: 3px solid rgba(255, 160, 60, 0.6); }

.fret-headers .shape-label {
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--heading);
  opacity: 0.7;
}

.fret-headers .root-fret {
  font-weight: 700;
  color: var(--heading);
}

.cell .dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 600;
  z-index: 1;
  color: var(--dot-text);
  transition: all 0.15s;
  line-height: 1.1;
}

.cell .dot .note-name {
  font-size: 0.45rem;
  font-weight: 400;
  opacity: 0.6;
}

.cell:hover .dot { background: var(--dot-hover); }

.cell.selected .dot {
  background: #4a6fff;
  color: #fff;
  box-shadow: 0 0 8px rgba(74, 111, 255, 0.5);
}

.cell.selected.iv-1 .dot { background: #e74c3c; }
.cell.selected.iv-2 .dot { background: #3498db; }
.cell.selected.iv-3 .dot { background: #e67e22; }
.cell.selected.iv-4 .dot { background: #1abc9c; }
.cell.selected.iv-5 .dot { background: #2ecc71; }
.cell.selected.iv-6 .dot { background: #f39c12; }
.cell.selected.iv-7 .dot { background: #9b59b6; }
.cell.selected.iv-b2 .dot { background: #1a6fa0; }
.cell.selected.iv-b3 .dot { background: #a85a15; }
.cell.selected.iv-b4 .dot { background: #117a60; }
.cell.selected.iv-b5 .dot { background: #1e8449; }
.cell.selected.iv-b6 .dot { background: #b7770a; }
.cell.selected.iv-b7 .dot { background: #6c3483; }

/* --- Controls --- */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.controls label {
  font-size: 0.85rem;
  color: var(--text);
}

.controls input[type="number"] {
  width: 50px;
  padding: 5px 6px;
  border: 1px solid var(--input-border);
  border-radius: 4px;
  background: var(--input-bg);
  color: var(--heading);
  font-size: 0.85rem;
  text-align: center;
}

.controls select {
  padding: 5px 6px;
  border: 1px solid var(--input-border);
  border-radius: 4px;
  background: var(--input-bg);
  color: var(--heading);
  font-size: 0.85rem;
}

.controls button {
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  background: #4a6fff;
  color: #fff;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}

.controls button:hover { background: #3a5fef; }
.controls button:disabled { background: var(--btn-bg); color: var(--muted); cursor: not-allowed; }

.seed-display {
  text-align: center;
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 8px;
}

/* --- Output --- */
.output-header {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin-bottom: 12px;
}

.bars {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.bars-row {
  display: inline-flex;
  align-items: stretch;
  background: var(--bar-bg);
  border-radius: 6px;
}

.bar-num {
  display: flex;
  align-items: center;
  font-size: 0.6rem;
  color: var(--muted);
  padding-right: 4px;
  min-width: 20px;
  justify-content: flex-end;
}

.bar {
  display: flex;
  align-items: stretch;
  padding: 6px 0;
  gap: 2px;
  border-right: 2px solid var(--bar-line);
}

.bars-row .bar:first-of-type {
  padding-left: 4px;
  border-left: 3px solid var(--bar-line);
}

.bars-row .bar:last-of-type {
  border-right: 3px solid var(--bar-line);
  padding-right: 4px;
}

.note-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 40px;
  padding: 4px 2px;
}

.note-cell .octave-dot {
  font-size: 0.45rem;
  line-height: 1;
  height: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.note-cell .interval {
  font-size: 1.2rem;
  font-weight: 700;
  line-height: 1;
}

.note-cell .string-ind {
  font-size: 0.55rem;
  color: var(--string-ind);
  margin-top: 1px;
}

.note-cell.iv-1 .interval, .note-cell.iv-1 .octave-dot { color: #e74c3c; }
.note-cell.iv-2 .interval, .note-cell.iv-2 .octave-dot { color: #3498db; }
.note-cell.iv-3 .interval, .note-cell.iv-3 .octave-dot { color: #e67e22; }
.note-cell.iv-4 .interval, .note-cell.iv-4 .octave-dot { color: #1abc9c; }
.note-cell.iv-5 .interval, .note-cell.iv-5 .octave-dot { color: #2ecc71; }
.note-cell.iv-6 .interval, .note-cell.iv-6 .octave-dot { color: #f39c12; }
.note-cell.iv-7 .interval, .note-cell.iv-7 .octave-dot { color: #9b59b6; }
.note-cell.iv-b2 .interval, .note-cell.iv-b2 .octave-dot { color: #1a6fa0; }
.note-cell.iv-b3 .interval, .note-cell.iv-b3 .octave-dot { color: #a85a15; }
.note-cell.iv-b4 .interval, .note-cell.iv-b4 .octave-dot { color: #117a60; }
.note-cell.iv-b5 .interval, .note-cell.iv-b5 .octave-dot { color: #1e8449; }
.note-cell.iv-b6 .interval, .note-cell.iv-b6 .octave-dot { color: #b7770a; }
.note-cell.iv-b7 .interval, .note-cell.iv-b7 .octave-dot { color: #6c3483; }

/* --- Responsive --- */
@media (max-width: 900px) {
  .layout { flex-direction: column; gap: 16px; }
  .sidebar {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid var(--btn-border);
    padding-bottom: 16px;
  }
  .main-spacer { display: none; }
}

@media (max-width: 500px) {
  body { padding: 10px; }
  h1 { font-size: 1.2rem; margin-bottom: 10px; }
  .fretboard { grid-template-columns: 20px repeat(16, 38px); grid-template-rows: repeat(6, 36px); }
  .fret-headers { grid-template-columns: 20px repeat(16, 38px); }
  .cell .dot { width: 30px; height: 30px; font-size: 0.6rem; }
  .presets button { padding: 5px 8px; font-size: 0.75rem; }
  .note-cell { width: 34px; }
  .note-cell .interval { font-size: 1rem; }
  .theme-toggle { top: 10px; right: 10px; padding: 4px 8px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle">Light</button>

<div class="layout">
<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <h1>ChordBot</h1>

      <div class="presets" id="presets"></div>

      <div class="root-display" id="rootDisplay"></div>
      <div class="shape-jumps">
        <button class="shape-jump" id="jumpE">E shape</button>
        <button class="shape-jump" id="jumpA">A shape</button>
      </div>

      <div class="fretboard-container" id="fretboardContainer">
        <div class="fret-headers" id="fret-headers"></div>
        <div class="fretboard" id="fretboard"></div>
      </div>

      <div class="controls">
        <label>Bars: <input type="number" id="barCount" value="16" min="1" max="64"></label>
        <select id="genMode" onchange="generate(false)">
          <option value="random">Random</option>
          <option value="melody">Melody</option>
        </select>
        <button id="generateBtn">Generate</button>
      </div>

      <div class="seed-display" id="seedDisplay"></div>
    </div>
  </aside>
  <main class="main">
    <div class="main-spacer">ChordBot</div>
    <div class="output-header" id="outputHeader"></div>
    <div class="bars" id="output"></div>
  </main>
</div>

<script>
// ============================================================
// DATA MODEL
// ============================================================

const INTERVAL_NAMES = ['1','b2','2','b3','3','4','b5','5','b6','6','b7','7'];
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const OPEN_TUNING = [40, 45, 50, 55, 59, 64]; // MIDI: E2, A2, D3, G3, B3, E4
const STRING_LABELS  = ['6','5','4','3','2','1'];
const NUM_STRINGS = 6;
const TOTAL_FRETS = 16; // frets 0-15

// Presets: { E: [[stringIdx, offset], ...], A: [[stringIdx, offset], ...] }
// E offsets relative to E-shape root fret, A offsets relative to A-shape root fret
const PRESETS = {
  // --- Major family ---
  'Major':       { E: [[0,0],[1,2],[2,2],[3,1],[4,0],[5,0]],
                   A: [[0,0],[1,0],[2,2],[3,2],[4,2],[5,0]] },
  'Major Arp':   { E: [[0,0],[1,-1],[1,2],[2,2],[3,1],[4,0],[5,0]],
                   A: [[0,0],[1,0],[2,-1],[2,2],[3,2],[4,2],[5,0]] },
  'Maj7 Arp':    { E: [[0,-1],[0,0],[1,-1],[1,2],[2,1],[2,2],[3,1],[4,0],[5,-1],[5,0]],
                   A: [[0,0],[1,-1],[1,0],[2,-1],[2,2],[3,1],[3,2],[4,2],[5,0],[5,4]] },
  'Maj9 Arp':    { E: [[0,-1],[0,0],[0,2],[1,-1],[1,2],[2,1],[2,2],[3,-1],[3,1],[4,0],[5,-1],[5,0],[5,2]],
                   A: [[0,0],[1,-1],[1,0],[1,2],[2,-1],[2,2],[3,1],[3,2],[4,0],[4,2],[5,0],[5,4]] },
  'Major Scale': { E: [[0,-1],[0,0],[0,2],[1,-1],[1,0],[1,2],[2,-1],[2,1],[2,2],[3,-1],[3,1],[3,2],[4,0],[4,2],[5,-1],[5,0],[5,2]],
                   A: [[0,0],[0,2],[1,-1],[1,0],[1,2],[2,-1],[2,0],[2,2],[3,-1],[3,1],[3,2],[4,0],[4,2],[4,3],[5,0],[5,2],[5,4]] },
  // --- Dominant family ---
  'Dom7 Arp':    { E: [[0,-2],[0,0],[1,-1],[1,2],[2,0],[2,2],[3,1],[4,0],[4,3],[5,0],[5,4]],
                   A: [[0,0],[0,3],[1,0],[2,-1],[2,2],[3,0],[3,2],[4,2],[5,0],[5,3]] },
  'Dom9 Arp':    { E: [[0,-2],[0,0],[0,2],[1,-1],[1,2],[2,0],[2,2],[3,-1],[3,1],[4,0],[4,3],[5,0],[5,2],[5,4]],
                   A: [[0,0],[0,3],[1,0],[1,2],[2,-1],[2,2],[3,0],[3,2],[4,0],[4,2],[5,0],[5,3]] },
  'Mixolydian':  { E: [[0,-2],[0,0],[0,2],[1,-1],[1,0],[1,2],[2,-1],[2,0],[2,2],[3,-1],[3,1],[3,2],[4,0],[4,2],[4,3],[5,0],[5,2],[5,4]],
                   A: [[0,0],[0,2],[0,3],[1,0],[1,2],[2,-1],[2,0],[2,2],[3,-1],[3,0],[3,2],[4,0],[4,2],[4,3],[5,0],[5,2],[5,3]] },
  // --- Minor family ---
  'Minor':       { E: [[0,0],[1,2],[2,2],[3,0],[4,0],[5,0]],
                   A: [[0,0],[1,0],[2,2],[3,2],[4,1],[5,0]] },
  'Minor Arp':   { E: [[0,0],[0,3],[1,2],[2,2],[3,0],[4,0],[5,0],[5,3]],
                   A: [[0,0],[1,0],[1,3],[2,2],[3,2],[4,1],[5,0]] },
  'Min7 Arp':    { E: [[0,0],[0,3],[1,2],[2,0],[2,2],[3,0],[4,0],[4,3],[5,0],[5,3]],
                   A: [[0,0],[0,3],[1,0],[1,3],[2,2],[3,0],[3,2],[4,1],[5,0],[5,3]] },
  'Min9 Arp':    { E: [[0,0],[0,2],[0,3],[1,2],[2,0],[2,2],[3,-1],[3,0],[4,0],[4,3],[5,0],[5,2],[5,3]],
                   A: [[0,0],[0,3],[1,0],[1,2],[1,3],[2,2],[3,0],[3,2],[4,0],[4,1],[5,0],[5,3]] },
  'Pentatonic':  { E: [[0,0],[0,3],[1,0],[1,2],[2,0],[2,2],[3,0],[3,2],[4,0],[4,3],[5,0],[5,3]],
                   A: [[0,0],[0,3],[1,0],[1,3],[2,0],[2,2],[3,0],[3,2],[4,1],[4,3],[5,0],[5,3]] },
  'Blues':        { E: [[0,0],[0,3],[1,0],[1,1],[1,2],[2,0],[2,2],[3,0],[3,2],[3,3],[4,0],[4,3],[5,0],[5,3]],
                   A: [[0,-1],[0,0],[0,3],[1,0],[1,3],[2,0],[2,1],[2,2],[3,0],[3,2],[4,1],[4,3],[5,0],[5,3]] },
  'Dorian':      { E: [[0,0],[0,2],[0,3],[1,0],[1,2],[2,-1],[2,0],[2,2],[3,-1],[3,0],[3,2],[4,0],[4,2],[4,3],[5,0],[5,2],[5,3]],
                   A: [[0,0],[0,2],[0,3],[1,0],[1,2],[1,3],[2,0],[2,2],[3,-1],[3,0],[3,2],[4,0],[4,1],[4,3],[5,0],[5,2],[5,3]] },
  'Minor Scale': { E: [[0,0],[0,2],[0,3],[1,0],[1,2],[1,3],[2,0],[2,2],[3,-1],[3,0],[3,2],[4,0],[4,1],[4,3],[5,0],[5,2],[5,3]],
                   A: [[0,0],[0,1],[0,3],[1,0],[1,2],[1,3],[2,0],[2,2],[2,3],[3,0],[3,2],[4,0],[4,1],[4,3],[5,0],[5,1],[5,3]] },
  // --- Diminished family ---
  'm7b5':        { E: [[0,0],[0,3],[1,1],[2,0],[2,2],[3,0],[3,3],[4,3],[5,0],[5,3]],
                   A: [[0,-1],[0,3],[1,0],[1,3],[2,1],[3,0],[3,2],[4,1],[5,-1],[5,3]] },
  'Dim7':        { E: [[0,0],[0,3],[1,1],[1,4],[2,2],[3,0],[3,3],[4,2],[5,0],[5,3]],
                   A: [[0,-1],[1,0],[1,3],[2,1],[3,-1],[3,2],[4,1],[5,-1],[5,2]] },
};

// ============================================================
// FRETBOARD COMPUTATION
// ============================================================

// Absolute MIDI pitch at a fretboard position
function midiPitch(stringIdx, fret) {
  return OPEN_TUNING[stringIdx] + fret;
}

// Semitone interval relative to current root
function semitoneFromRoot(stringIdx, fret) {
  const rootPitch = OPEN_TUNING[0] + rootFret; // root on string 6
  return midiPitch(stringIdx, fret) - rootPitch;
}

// Get interval name from semitone offset
function intervalName(semitone) {
  return INTERVAL_NAMES[((semitone % 12) + 12) % 12];
}

// Get note name at a fretboard position
function noteName(stringIdx, fret) {
  return NOTE_NAMES[midiPitch(stringIdx, fret) % 12];
}

// ============================================================
// INTERVAL COLOR MAPPING
// ============================================================

function ivClass(name) {
  const aliases = {'9':'2','11':'4','13':'6'};
  const resolved = aliases[name] || name;
  const n = resolved.replace('b', '');
  if ('1234567'.includes(n)) return 'iv-' + (resolved.startsWith('b') ? 'b' : '') + n;
  return 'iv-b2';
}

// ============================================================
// STATE
// ============================================================

let selectedNotes = new Set();   // "s-fret" keys (absolute fret numbers)
let activePreset = 'Major';
let rootFret = 0; // absolute fret where the root is
let activeShape = 'E'; // which shape the user last jumped to
let currentSeed = parseInt(localStorage.getItem('cb-seed')) || Date.now();

// seeded PRNG (mulberry32)
function makeRng(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function newSeed() {
  currentSeed = Date.now();
  localStorage.setItem('cb-seed', currentSeed);
}

// ============================================================
// FRETBOARD VIEW
// ============================================================

function buildFretHeaders() {
  const el = document.getElementById('fret-headers');
  el.innerHTML = '<span></span>'; // spacer for string labels
  for (let f = 0; f < TOTAL_FRETS; f++) {
    const span = document.createElement('span');
    span.dataset.fret = f;
    const aShapeFret = ((rootFret - 5) % 12 + 12) % 12;
    if (f === rootFret && f === aShapeFret) {
      span.innerHTML = f + '<br><span class="shape-label">E A</span>';
      span.classList.add('root-fret');
    } else if (f === rootFret) {
      span.innerHTML = f + '<br><span class="shape-label">E</span>';
      span.classList.add('root-fret');
    } else if (f === aShapeFret) {
      span.innerHTML = f + '<br><span class="shape-label">A</span>';
      span.classList.add('root-fret');
    } else {
      span.textContent = f;
    }
    el.appendChild(span);
  }
}

function buildFretboard() {
  const fb = document.getElementById('fretboard');
  fb.innerHTML = '';
  for (let s = NUM_STRINGS - 1; s >= 0; s--) {
    const label = document.createElement('div');
    label.className = 'string-label';
    label.textContent = STRING_LABELS[s];
    fb.appendChild(label);

    for (let f = 0; f < TOTAL_FRETS; f++) {
      const cell = document.createElement('div');
      const key = s + '-' + f;
      const semi = semitoneFromRoot(s, f);
      const interval = intervalName(semi);
      const note = noteName(s, f);

      const aRoot = aShapeRootFret();
      cell.className = 'cell row-' + s;
      // E shape zone: root-1 to root+3
      if (f >= rootFret - 1 && f <= rootFret + 3) {
        if (f === rootFret) cell.classList.add('e-zone-root');
        else if (f === rootFret - 1) cell.classList.add('e-zone-left');
        else cell.classList.add('e-zone');
        if (f === rootFret + 3) cell.classList.add('e-zone-right');
      }
      // A shape zone: root-1 to root+3
      if (f >= aRoot - 1 && f <= aRoot + 3) {
        if (f === aRoot) cell.classList.add('a-zone-root');
        else if (f === aRoot - 1) cell.classList.add('a-zone-left');
        else cell.classList.add('a-zone');
        if (f === aRoot + 3) cell.classList.add('a-zone-right');
      }
      cell.dataset.key = key;
      cell.dataset.string = s;
      cell.dataset.fret = f;

      const dot = document.createElement('div');
      dot.className = 'dot';
      const ivSpan = document.createElement('span');
      ivSpan.textContent = interval;
      dot.appendChild(ivSpan);
      const noteSpan = document.createElement('span');
      noteSpan.className = 'note-name';
      noteSpan.textContent = note;
      dot.appendChild(noteSpan);
      cell.appendChild(dot);

      cell.addEventListener('click', () => {
        if (selectedNotes.has(key)) selectedNotes.delete(key);
        else selectedNotes.add(key);
        activePreset = null;
        updateAllUI();
        generate(false);
      });
      fb.appendChild(cell);
    }
  }
}

function updateFretboard() {
  document.querySelectorAll('.fretboard .cell').forEach(cell => {
    const key = cell.dataset.key;
    const s = parseInt(cell.dataset.string);
    const f = parseInt(cell.dataset.fret);
    const interval = intervalName(semitoneFromRoot(s, f));

    // update labels (interval + note name) when root changes
    const dot = cell.querySelector('.dot');
    const spans = dot.querySelectorAll('span');
    spans[0].textContent = interval;
    spans[1].textContent = noteName(s, f);

    // update root column highlight
    cell.classList.toggle('root-col', f === rootFret);

    // update zone + selection styling
    const aRoot = aShapeRootFret();
    cell.className = cell.className.replace(/ selected| iv-\S+| e-zone\S*| a-zone\S*/g, '');
    if (f >= rootFret - 1 && f <= rootFret + 3) {
      if (f === rootFret) cell.classList.add('e-zone-root');
      else if (f === rootFret - 1) cell.classList.add('e-zone-left');
      else cell.classList.add('e-zone');
      if (f === rootFret + 3) cell.classList.add('e-zone-right');
    }
    if (f >= aRoot - 1 && f <= aRoot + 3) {
      if (f === aRoot) cell.classList.add('a-zone-root');
      else if (f === aRoot - 1) cell.classList.add('a-zone-left');
      else cell.classList.add('a-zone');
      if (f === aRoot + 3) cell.classList.add('a-zone-right');
    }
    if (selectedNotes.has(key)) {
      cell.classList.add('selected', ivClass(interval));
    }
  });
}

function scrollToFret(fret, smooth) {
  const container = document.getElementById('fretboardContainer');
  const cellWidth = container.querySelector('.cell') ?
    container.querySelector('.cell').offsetWidth : 48;
  const targetX = 24 + fret * cellWidth - container.clientWidth / 3;
  if (smooth) {
    container.scrollTo({ left: Math.max(0, targetX), behavior: 'smooth' });
  } else {
    container.scrollLeft = Math.max(0, targetX);
  }
}

function scrollToRoot() {
  scrollToFret(rootFret, false);
}

function updateRootDisplay() {
  const rootNote = NOTE_NAMES[(OPEN_TUNING[0] + rootFret) % 12];
  document.getElementById('rootDisplay').textContent = 'Root: ' + rootNote + ' (fret ' + rootFret + ')';
}

// ============================================================
// PRESETS UI
// ============================================================

// [name, gridColumn] — col 1=Chord, 2=7th Arp, 3=9th Arp, 4=Scale
const PRESET_GRID = [
  ['Major',       1],
  ['Major Arp',   2],
  ['Maj7 Arp',    2],
  ['Maj9 Arp',    3],
  ['Major Scale', 4],
  ['Dom7 Arp',    2],
  ['Dom9 Arp',    3],
  ['Mixolydian',  4],
  ['Minor',       1],
  ['Minor Arp',   2],
  ['Min7 Arp',    2],
  ['Min9 Arp',    3],
  ['Dorian',      4],
  ['Pentatonic',  3],
  ['Minor Scale', 4],
  ['m7b5',        2],
  ['Blues',        3],
  ['Dim7',        2],
];

function buildPresets() {
  const container = document.getElementById('presets');
  PRESET_GRID.forEach(([name, col]) => {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.dataset.preset = name;
    btn.style.gridColumn = col;
    btn.addEventListener('click', () => loadPreset(name));
    container.appendChild(btn);
  });
  // spacer to force Clear onto its own row
  const spacer = document.createElement('div');
  spacer.style.gridColumn = '1 / -1';
  spacer.style.height = '0';
  container.appendChild(spacer);

  const clearBtn = document.createElement('button');
  clearBtn.textContent = 'Clear';
  clearBtn.className = 'clear';
  clearBtn.style.gridColumn = '4';
  clearBtn.addEventListener('click', () => {
    selectedNotes.clear();
    activePreset = null;
    updateAllUI();
    document.getElementById('output').innerHTML = '';
    document.getElementById('outputHeader').textContent = '';
  });
  container.appendChild(clearBtn);
}

function aShapeRootFret() {
  return ((rootFret - 5) % 12 + 12) % 12;
}

function loadPreset(name) {
  selectedNotes.clear();
  const preset = PRESETS[name];
  // E shape notes (relative to rootFret)
  if (preset.E) {
    preset.E.forEach(([s, offset]) => {
      const fret = rootFret + offset;
      if (fret >= 0 && fret < TOTAL_FRETS) {
        selectedNotes.add(s + '-' + fret);
      }
    });
  }
  // A shape notes (relative to A-shape root fret)
  if (preset.A) {
    const aRoot = aShapeRootFret();
    preset.A.forEach(([s, offset]) => {
      const fret = aRoot + offset;
      if (fret >= 0 && fret < TOTAL_FRETS) {
        selectedNotes.add(s + '-' + fret);
      }
    });
  }
  activePreset = name;
  updateAllUI();
  scrollToActiveShape();
  generate(false);
}

function scrollToActiveShape() {
  if (activeShape === 'A') {
    scrollToFret(aShapeRootFret(), false);
  } else {
    scrollToFret(rootFret, false);
  }
}

function updateAllUI() {
  updateFretboard();
  document.querySelectorAll('.presets button[data-preset]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === activePreset);
  });
  document.getElementById('generateBtn').disabled = selectedNotes.size === 0;
}

// ============================================================
// NOTE POOL & JIANPU
// ============================================================

function buildNotePool() {
  // Use E shape preset offsets directly for generation
  const notes = [];
  const preset = activePreset && PRESETS[activePreset];
  if (preset && preset.E) {
    preset.E.forEach(([s, offset]) => {
      const fret = rootFret + offset;
      if (fret < 0 || fret >= TOTAL_FRETS) return;
      if (!selectedNotes.has(s + '-' + fret)) return;
      const semi = offset + (OPEN_TUNING[s] - OPEN_TUNING[0]); // same as old STRING_OFFSETS[s] + offset
      const interval = intervalName(semi);
      notes.push({
        stringIdx: s,
        fret: fret,
        semitone: semi,
        interval: interval,
        stringLabel: STRING_LABELS[s],
      });
    });
  } else {
    // custom selection: use all selected notes
    selectedNotes.forEach(key => {
      const [s, f] = key.split('-').map(Number);
      const semi = semitoneFromRoot(s, f);
      const interval = intervalName(semi);
      notes.push({
        stringIdx: s,
        fret: f,
        semitone: semi,
        interval: interval,
        stringLabel: STRING_LABELS[s],
      });
    });
  }
  notes.sort((a, b) => a.semitone - b.semitone);

  // octave dots: same as original — floor(semi/12) - 1
  // semi 0-11 = dot below, 12-23 = no dot, 24+ = dot above
  notes.forEach(n => { n.dots = Math.floor(n.semitone / 12) - 1; });

  return notes;
}

// ============================================================
// GENERATOR & RENDERER
// ============================================================

function generateRandom(notes, total, rng) {
  const sequence = [];
  for (let i = 0; i < total; i++) {
    sequence.push(notes[Math.floor(rng() * notes.length)]);
  }
  return sequence;
}

function generateMelody(notes, total, rng) {
  if (notes.length <= 1) return generateRandom(notes, total, rng);

  const sequence = [];
  let currIdx = Math.floor(rng() * notes.length);
  sequence.push(notes[currIdx]);

  for (let i = 1; i < total; i++) {
    const curr = notes[currIdx];
    const weights = [];
    let totalWeight = 0;

    for (let j = 0; j < notes.length; j++) {
      const semiDist = Math.abs(notes[j].semitone - curr.semitone);
      let w;
      if (semiDist === 0) w = 1;       // same pitch: low weight to avoid repeats
      else if (semiDist <= 2) w = 10;   // half/whole step
      else if (semiDist <= 4) w = 7;    // minor/major 3rd
      else if (semiDist <= 5) w = 4;    // perfect 4th
      else if (semiDist <= 7) w = 2;    // up to perfect 5th
      else w = 0.1;                     // beyond a 5th: near-zero

      // penalize repeating the same note we just played
      if (j === currIdx) w *= 0.3;

      // penalize A-B-A bounce
      if (sequence.length >= 2) {
        const prev2 = sequence[sequence.length - 2];
        if (notes[j].stringIdx === prev2.stringIdx && notes[j].fret === prev2.fret) {
          w *= 0.2;
        }
      }

      weights.push(w);
      totalWeight += w;
    }

    // weighted random pick
    let r = rng() * totalWeight;
    let nextIdx = 0;
    for (let j = 0; j < weights.length; j++) {
      r -= weights[j];
      if (r <= 0) { nextIdx = j; break; }
    }

    currIdx = nextIdx;
    sequence.push(notes[currIdx]);
  }
  return sequence;
}

function generate(rollNew) {
  if (rollNew) {
    newSeed();
    // derive random root fret from seed
    const rootRng = makeRng(currentSeed + 1);
    rootFret = Math.floor(rootRng() * 12) + 1;
    // re-apply active preset at new root
    if (activePreset && PRESETS[activePreset]) {
      selectedNotes.clear();
      const preset = PRESETS[activePreset];
      if (preset.E) {
        preset.E.forEach(([s, offset]) => {
          const fret = rootFret + offset;
          if (fret >= 0 && fret < TOTAL_FRETS) selectedNotes.add(s + '-' + fret);
        });
      }
      if (preset.A) {
        const aRoot = aShapeRootFret();
        preset.A.forEach(([s, offset]) => {
          const fret = aRoot + offset;
          if (fret >= 0 && fret < TOTAL_FRETS) selectedNotes.add(s + '-' + fret);
        });
      }
    }
    buildFretHeaders();
    updateFretboard();
    updateRootDisplay();
    scrollToActiveShape();
  }

  const notes = buildNotePool();
  if (notes.length === 0) return;

  localStorage.setItem('cb-seed', currentSeed);
  document.getElementById('seedDisplay').textContent = 'seed: ' + currentSeed;

  const mode = document.getElementById('genMode').value;
  localStorage.setItem('cb-preset', activePreset || '');
  localStorage.setItem('cb-bars', document.getElementById('barCount').value);
  localStorage.setItem('cb-mode', mode);
  localStorage.setItem('cb-rootFret', rootFret);

  const rng = makeRng(currentSeed);
  const barCount = parseInt(document.getElementById('barCount').value) || 16;
  const total = barCount * 4;

  const sequence = mode === 'melody'
    ? generateMelody(notes, total, rng)
    : generateRandom(notes, total, rng);

  // build header
  const rootNote = NOTE_NAMES[(OPEN_TUNING[0] + rootFret) % 12];
  let headerText = (activePreset || 'Custom') + ' in ' + rootNote;
  headerText += ' \u2014 ' + barCount + ' bars';
  headerText += ' \u2014 ' + (mode === 'melody' ? 'Melody' : 'Random');
  document.getElementById('outputHeader').textContent = headerText;

  renderBars(sequence, barCount);
}

function getBarsPerRow() {
  const el = document.querySelector('.main');
  const w = el ? el.clientWidth : window.innerWidth;
  if (w >= 680) return 4;
  if (w >= 340) return 2;
  return 1;
}

function renderBars(sequence, barCount) {
  const container = document.getElementById('output');
  container.innerHTML = '';
  const barsPerRow = getBarsPerRow();

  for (let b = 0; b < barCount; b++) {
    if (b % barsPerRow === 0) {
      var rowEl = document.createElement('div');
      rowEl.className = 'bars-row';
      // bar number
      const num = document.createElement('div');
      num.className = 'bar-num';
      num.textContent = b + 1;
      rowEl.appendChild(num);
      container.appendChild(rowEl);
    }

    const bar = document.createElement('div');
    bar.className = 'bar';

    for (let i = 0; i < 4; i++) {
      const note = sequence[b * 4 + i];
      const cell = document.createElement('div');
      cell.className = 'note-cell ' + ivClass(note.interval);

      const dotAbove = document.createElement('div');
      dotAbove.className = 'octave-dot';
      dotAbove.textContent = note.dots > 0 ? '\u25CF'.repeat(note.dots) : '';
      cell.appendChild(dotAbove);

      const iv = document.createElement('div');
      iv.className = 'interval';
      iv.textContent = note.interval;
      cell.appendChild(iv);

      const dotBelow = document.createElement('div');
      dotBelow.className = 'octave-dot';
      dotBelow.textContent = note.dots < 0 ? '\u25CF'.repeat(-note.dots) : '';
      cell.appendChild(dotBelow);

      const str = document.createElement('div');
      str.className = 'string-ind';
      str.textContent = 's' + note.stringLabel;
      cell.appendChild(str);

      bar.appendChild(cell);
    }
    rowEl.appendChild(bar);
  }
}

function reLayoutBars() {
  const container = document.getElementById('output');
  const allBars = Array.from(container.querySelectorAll('.bar'));
  if (allBars.length === 0) return;

  const barsPerRow = getBarsPerRow();
  allBars.forEach(bar => bar.remove());
  container.innerHTML = '';

  for (let b = 0; b < allBars.length; b++) {
    if (b % barsPerRow === 0) {
      var rowEl = document.createElement('div');
      rowEl.className = 'bars-row';
      const num = document.createElement('div');
      num.className = 'bar-num';
      num.textContent = b + 1;
      rowEl.appendChild(num);
      container.appendChild(rowEl);
    }
    rowEl.appendChild(allBars[b]);
  }
}

// ============================================================
// INIT
// ============================================================

// restore state from localStorage
const savedRootFret = localStorage.getItem('cb-rootFret');
if (savedRootFret !== null) rootFret = parseInt(savedRootFret) || 0;

buildFretHeaders();
buildFretboard();
buildPresets();
updateRootDisplay();

// restore preset/bars/mode from localStorage, or default to Major
const savedPreset = localStorage.getItem('cb-preset');
const savedBars = localStorage.getItem('cb-bars');
const savedMode = localStorage.getItem('cb-mode');
if (savedBars) document.getElementById('barCount').value = savedBars;
if (savedMode) document.getElementById('genMode').value = savedMode;

if (savedPreset && PRESETS[savedPreset]) {
  loadPreset(savedPreset);
} else {
  loadPreset('Major');
}

document.getElementById('generateBtn').addEventListener('click', () => generate(true));
window.addEventListener('resize', reLayoutBars);

// shape jump buttons
document.getElementById('jumpE').addEventListener('click', () => { activeShape = 'E'; scrollToFret(rootFret, true); });
document.getElementById('jumpA').addEventListener('click', () => { activeShape = 'A'; scrollToFret(aShapeRootFret(), true); });

// --- Sidebar toggle ---
const sidebarEl = document.getElementById('sidebar');
const sidebarBtn = document.getElementById('sidebarToggle');
if (localStorage.getItem('cb-sidebar') === 'collapsed') {
  sidebarEl.classList.add('collapsed');
}
sidebarBtn.addEventListener('click', () => {
  sidebarEl.classList.toggle('collapsed');
  const collapsed = sidebarEl.classList.contains('collapsed');
  localStorage.setItem('cb-sidebar', collapsed ? 'collapsed' : 'open');
  reLayoutBars();
});

// --- Theme ---
const themeBtn = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'light' ? 'Dark' : 'Light';
themeBtn.addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeBtn.textContent = next === 'light' ? 'Dark' : 'Light';
});

// --- Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
